name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Type checking
        run: uv run mypy src/

      - name: Linting
        run: uv run ruff check src/

      - name: Run tests
        run: uv run pytest --cov=src/akgentic --cov-report=term-missing --cov-fail-under=80
